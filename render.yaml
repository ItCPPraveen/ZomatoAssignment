version: "1"

databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow_user
    plan: free
    region: oregon

services:
  - type: web
    name: taskflow-api
    env: docker
    plan: free
    region: oregon
    dockerContext: ./api
    dockerfilePath: ./api/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: PORT
        value: "4000"

  - type: web
    name: taskflow-frontend
    env: docker
    plan: free
    region: oregon
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taskflow-api
          property: host
        # Note: Render provides 'host' like taskflow-api.onrender.com
        # You may need to prepend https:// dynamically in your app, 
        # or we manually set it after deployment in the dashboard!
